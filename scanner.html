<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Сканування QR</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --text: #1f1f1f;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --danger: #dc2626;
      --success: #16a34a;
      --scan-line: rgba(37, 99, 235, 0.95);
      --scan-frame: rgba(37, 99, 235, 0.75);
      --scan-frame-success: rgba(22, 163, 74, 0.95);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin: 10px 0;
    }

    p {
      color: var(--muted);
      margin: 0 0 18px;
      font-size: 16px;
    }

    .card {
      position: relative;
      max-width: 420px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      overflow: hidden;
    }

    #reader {
      position: relative;
      width: 100%;
      min-height: 320px;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
    }

    .scan-overlay {
      position: absolute;
      inset: 12px;
      pointer-events: none;
      z-index: 5;
      border-radius: 14px;
      overflow: hidden;
    }

    .scan-frame {
      position: absolute;
      inset: 12%;
      border: 3px solid var(--scan-frame);
      border-radius: 18px;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.16);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .scan-frame.success {
      border-color: var(--scan-frame-success);
      box-shadow:
        0 0 0 9999px rgba(0, 0, 0, 0.10),
        0 0 0 4px rgba(22, 163, 74, 0.12);
      transform: scale(1.02);
    }

    .scan-corner {
      position: absolute;
      width: 28px;
      height: 28px;
      border-color: #fff;
      border-style: solid;
      z-index: 6;
    }

    .scan-corner.tl {
      top: 12%;
      left: 12%;
      border-width: 4px 0 0 4px;
      border-top-left-radius: 8px;
    }

    .scan-corner.tr {
      top: 12%;
      right: 12%;
      border-width: 4px 4px 0 0;
      border-top-right-radius: 8px;
    }

    .scan-corner.bl {
      bottom: 12%;
      left: 12%;
      border-width: 0 0 4px 4px;
      border-bottom-left-radius: 8px;
    }

    .scan-corner.br {
      bottom: 12%;
      right: 12%;
      border-width: 0 4px 4px 0;
      border-bottom-right-radius: 8px;
    }

    .scan-line {
      position: absolute;
      left: 14%;
      right: 14%;
      top: 18%;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--scan-line), transparent);
      box-shadow: 0 0 12px rgba(37, 99, 235, 0.8);
      animation: scanMove 2s linear infinite;
      z-index: 6;
      transition: opacity 0.2s ease;
    }

    .scan-line.hidden {
      opacity: 0;
      animation: none;
    }

    @keyframes scanMove {
      0% {
        top: 18%;
      }
      50% {
        top: 78%;
      }
      100% {
        top: 18%;
      }
    }

    #status {
      margin-top: 16px;
      font-size: 16px;
      font-weight: 700;
      min-height: 24px;
    }

    .ok {
      color: var(--success);
    }

    .err {
      color: var(--danger);
    }

    .hint {
      font-size: 14px;
      color: #777;
      margin-top: 8px;
      line-height: 1.4;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .hidden {
      display: none !important;
    }

    /* убираем лишний UI html5-qrcode */
    #reader__dashboard_section_csr,
    #reader__dashboard_section_swaplink,
    #reader__scan_region img,
    #reader__camera_selection {
      display: none !important;
    }

    #reader__dashboard {
      padding: 0 !important;
      margin: 0 !important;
      border: none !important;
    }

    #reader__scan_region {
      min-height: 320px !important;
    }

    video {
      border-radius: 14px;
      object-fit: cover !important;
    }
  </style>
</head>
<body>
  <h1>📷 Сканування QR</h1>
  <p>Наведи камеру на QR-код клієнта</p>

  <div class="card">
    <div id="reader"></div>

    <div class="scan-overlay">
      <div id="scanFrame" class="scan-frame"></div>
      <div class="scan-corner tl"></div>
      <div class="scan-corner tr"></div>
      <div class="scan-corner bl"></div>
      <div class="scan-corner br"></div>
      <div id="scanLine" class="scan-line"></div>
    </div>
  </div>

  <div id="status">Запускаємо камеру...</div>
  <div class="hint" id="hint">
    Після успішного сканування дані автоматично підуть у бота
  </div>

  <div class="actions">
    <button id="retryBtn" class="btn-primary hidden">Спробувати ще раз</button>
    <button id="closeBtn" class="btn-danger">Закрити</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const statusEl = document.getElementById("status");
    const hintEl = document.getElementById("hint");
    const retryBtn = document.getElementById("retryBtn");
    const closeBtn = document.getElementById("closeBtn");
    const scanFrameEl = document.getElementById("scanFrame");
    const scanLineEl = document.getElementById("scanLine");

    let qrScanner = null;
    let scannerStarted = false;
    let alreadyScanned = false;
    let isSending = false;
    let audioContext = null;

    function setStatus(text, className = "") {
      statusEl.textContent = text;
      statusEl.className = className;
    }

    function showRecoveryButtons() {
      retryBtn.classList.remove("hidden");
    }

    function hideRecoveryButtons() {
      retryBtn.classList.add("hidden");
    }

    function setScanSuccessUI() {
      scanFrameEl.classList.add("success");
      scanLineEl.classList.add("hidden");
    }

    function resetScanUI() {
      scanFrameEl.classList.remove("success");
      scanLineEl.classList.remove("hidden");
    }

    async function stopScanner() {
      if (!qrScanner || !scannerStarted) return;

      try {
        await qrScanner.stop();
      } catch (_) {}

      try {
        await qrScanner.clear();
      } catch (_) {}

      scannerStarted = false;
    }

    function qrboxSize(viewfinderWidth, viewfinderHeight) {
      const size = Math.min(viewfinderWidth, viewfinderHeight) * 0.72;
      return {
        width: Math.floor(size),
        height: Math.floor(size)
      };
    }

    function vibrateSuccess() {
      if (navigator.vibrate) {
        navigator.vibrate(120);
      }
    }

    function playBeep() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;

        if (!audioContext) {
          audioContext = new AudioCtx();
        }

        const duration = 0.12;
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(1120, audioContext.currentTime);

        gainNode.gain.setValueAtTime(0.0001, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.18, audioContext.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + duration);
      } catch (e) {
        console.warn("Beep error:", e);
      }
    }

    async function sendResultToBot(decodedText) {
      if (isSending) return;
      isSending = true;

      if (!decodedText.startsWith("coffee:")) {
        setStatus("❌ Це не QR-код бота", "err");
        hintEl.textContent = "Спробуй відсканувати правильний QR-код клієнта";
        alreadyScanned = false;
        isSending = false;
        return;
      }

      try {
        setScanSuccessUI();
        vibrateSuccess();
        playBeep();

        setStatus("✅ Успішно! Відправляємо...", "ok");
        hintEl.textContent = "Дані передаються у Telegram...";

        await stopScanner();

        tg.sendData(decodedText);

        setTimeout(() => {
          tg.close();
        }, 350);
      } catch (e) {
        console.error("sendResultToBot error:", e);
        setStatus("❌ Помилка відправки даних у Telegram", "err");
        hintEl.textContent = "Спробуй ще раз";
        alreadyScanned = false;
        isSending = false;
        resetScanUI();
        showRecoveryButtons();
      }
    }

    async function onScanSuccess(decodedText) {
      if (alreadyScanned) return;
      alreadyScanned = true;
      await sendResultToBot(decodedText);
    }

    function onScanFailure(_) {
      // ничего не делаем, чтобы не спамить ошибками
    }

    async function startScanner() {
      hideRecoveryButtons();
      alreadyScanned = false;
      isSending = false;
      resetScanUI();

      setStatus("Запускаємо камеру...");
      hintEl.textContent = "Після успішного сканування дані автоматично підуть у бота";

      try {
        if (qrScanner) {
          try {
            await qrScanner.clear();
          } catch (_) {}
        }

        qrScanner = new Html5Qrcode("reader");

        const config = {
          fps: 10,
          qrbox: qrboxSize,
          aspectRatio: 1.0,
          disableFlip: false,
          rememberLastUsedCamera: true
        };

        try {
          await qrScanner.start(
            { facingMode: { exact: "environment" } },
            config,
            onScanSuccess,
            onScanFailure
          );
        } catch (firstError) {
          console.warn("Exact back camera failed, fallback:", firstError);

          await qrScanner.start(
            { facingMode: "environment" },
            config,
            onScanSuccess,
            onScanFailure
          );
        }

        scannerStarted = true;
        setStatus("Наведи камеру на QR-код");
      } catch (error) {
        console.error("Camera start failed:", error);
        setStatus("❌ Не вдалося відкрити камеру", "err");
        hintEl.textContent = "Дозволь доступ до камери та спробуй ще раз.";
        resetScanUI();
        showRecoveryButtons();
      }
    }

    retryBtn.addEventListener("click", async () => {
      await startScanner();
    });

    closeBtn.addEventListener("click", async () => {
      await stopScanner();
      tg.close();
    });

    window.addEventListener("beforeunload", async () => {
      await stopScanner();
    });

    startScanner();
  </script>
</body>
</html>
