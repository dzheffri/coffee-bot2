<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сканування QR</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
      color: #555;
    }

    #reader {
      width: 320px;
      max-width: 100%;
      margin: 0 auto 20px auto;
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-sizing: border-box;
    }

    #status {
      margin-top: 15px;
      font-size: 16px;
      min-height: 24px;
    }

    .ok {
      color: green;
      font-weight: bold;
    }

    .err {
      color: crimson;
      font-weight: bold;
    }

    .hint {
      font-size: 14px;
      color: #777;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>📷 Сканування QR</h1>
  <p>Наведіть камеру на QR-код клієнта</p>

  <div id="reader"></div>
  <div id="status">Очікуємо запуск камери...</div>
  <div class="hint">Після успішного сканування дані автоматично підуть у бота</div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let alreadyScanned = false;

    function setStatus(text, className = "") {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = className;
    }

    function onScanSuccess(decodedText) {
      if (alreadyScanned) return;
      alreadyScanned = true;

      if (!decodedText.startsWith("coffee:")) {
        setStatus("❌ Це не QR-код бота", "err");
        alreadyScanned = false;
        return;
      }

      setStatus("✅ QR успішно зчитано. Відправляємо в бота...", "ok");

      try {
        tg.sendData(decodedText);
      } catch (e) {
        setStatus("❌ Помилка відправки даних у Telegram", "err");
        console.error(e);
        alreadyScanned = false;
      }
    }

    function onScanFailure(error) {
      // Ничего не делаем, чтобы не спамить ошибками
    }

    const html5QrCodeScanner = new Html5QrcodeScanner(
      "reader",
      {
        fps: 10,
        qrbox: { width: 220, height: 220 },
        rememberLastUsedCamera: true
      },
      false
    );

    html5QrCodeScanner.render(onScanSuccess, onScanFailure);
  </script>
</body>
</html>
